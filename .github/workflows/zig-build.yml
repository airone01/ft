name: Zig CI
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
jobs:
  build:
    name: Zig CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install system
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxext-dev \
            libreadline-dev
      - name: Cache NASM
        id: cache-nasm
        uses: actions/cache@v4
        with:
          path: ~/nasm-install
          key: nasm-3.01-${{ runner.os }}
      - name: Build and install NASM
        if: steps.cache-nasm.outputs.cache-hit != 'true'
        run: |
          wget https://www.nasm.us/pub/nasm/releasebuilds/3.01/nasm-3.01.tar.gz
          tar xzf nasm-3.01.tar.gz
          cd nasm-3.01
          ./configure --prefix=$HOME/nasm-install
          make -j$(nproc)
          make install
      - name: Add NASM to PATH
        run: echo "$HOME/nasm-install/bin" >> $GITHUB_PATH
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Zig
        uses: actions/cache@v5
        with:
          path: .zig-cache
          key: ${{ runner.os }}-zig-${{ hashFiles('build.zig', 'build.zig.zon', 'build_helpers.zig') }}
          restore-keys: |
            ${{ runner.os }}-zig-
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tools/push-swap-visualizer-minecraft/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build All Targets
        run: zig build --global-cache-dir .zig-cache
